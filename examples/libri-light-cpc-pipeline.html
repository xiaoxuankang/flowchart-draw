<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPC Unsupervised Baseline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .diagram {
      display: flex;
      align-items: center;
      gap: 0;
      max-width: 1100px;
    }

    /* ── Input: audio stack ── */
    .input-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .audio-icon {
      position: relative;
      width: 56px;
      height: 68px;
    }

    .audio-sheet {
      position: absolute;
      width: 44px;
      height: 52px;
      background: #f5f5f5;
      border: 1.5px solid #bbb;
      border-radius: 4px;
    }

    .audio-sheet:nth-child(1) { top: 0;  left: 0;  }
    .audio-sheet:nth-child(2) { top: 6px; left: 6px; background: #fafafa; }
    .audio-sheet:nth-child(3) { top: 12px; left: 12px; background: #fff;
      display: flex; align-items: center; justify-content: center; }

    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 24px;
    }

    .waveform span {
      display: block;
      width: 3px;
      background: #888;
      border-radius: 1px;
    }

    .input-label {
      font-size: 15px;
      font-weight: 600;
      color: #222;
      text-align: center;
      line-height: 1.3;
    }

    .input-sub {
      font-size: 11px;
      font-weight: 400;
      color: #666;
    }

    /* ── Arrows ── */
    .arrow {
      flex-shrink: 0;
      width: 36px;
      height: 2px;
      background: #333;
      position: relative;
      margin: 0 4px;
    }

    .arrow::after {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-left: 8px solid #333;
    }

    /* ── Dashed stage containers ── */
    .stage {
      border: 2px dashed #c8c8c8;
      border-radius: 18px;
      padding: 28px 24px 22px;
      position: relative;
      flex-shrink: 0;
    }

    .stage-title {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 0 12px;
      font-size: 17px;
      font-weight: 700;
      color: #222;
      white-space: nowrap;
    }

    .stage-inner {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* ── Boxes ── */
    .box {
      border-radius: 14px;
      border: 1.5px solid rgba(0,0,0,0.12);
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      color: #222;
      text-align: center;
      line-height: 1.35;
      white-space: nowrap;
    }

    .box small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #555;
      margin-top: 3px;
    }

    .box-pink  { background: #f5c6cb; }
    .box-yellow { background: #fff3cd; }
    .box-blue  { background: #cce5ff; }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ellipsis {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      letter-spacing: 2px;
      margin-left: 8px;
      flex-shrink: 0;
    }

    /* caption below diagram */
    .caption-wrap {
      position: fixed;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="diagram" id="diagram">

    <!-- Input -->
    <div class="input-block">
      <div class="audio-icon">
        <div class="audio-sheet"></div>
        <div class="audio-sheet"></div>
        <div class="audio-sheet">
          <div class="waveform">
            <span style="height:8px"></span>
            <span style="height:16px"></span>
            <span style="height:22px"></span>
            <span style="height:14px"></span>
            <span style="height:20px"></span>
            <span style="height:10px"></span>
            <span style="height:18px"></span>
          </div>
        </div>
      </div>
      <div class="input-label">
        Unlabeled Audio
        <span class="input-sub">unlab-600 / 6k / 60k</span>
      </div>
    </div>

    <div class="arrow"></div>

    <!-- Stage 1: Encoding -->
    <div class="stage">
      <div class="stage-title">Encoding</div>
      <div class="stage-inner">
        <div class="box box-pink">
          CNN Encoder
          <small>5 layers · 10 ms/frame · 256-d</small>
        </div>
        <div class="arrow"></div>
        <div class="stack">
          <div class="box box-yellow">
            LSTM
            <small>phonetic embedding</small>
          </div>
          <div class="box box-yellow">
            Transformer Predictor
            <small>future steps 1–12</small>
          </div>
          <div class="box box-yellow" style="font-size:20px; padding:6px 20px;">…</div>
        </div>
      </div>
    </div>

    <div class="arrow"></div>

    <!-- Stage 2: Learning -->
    <div class="stage">
      <div class="stage-title">Learning</div>
      <div class="stack">
        <div class="box box-blue">
          InfoNCE Loss
          <small>predict ↔ future frames</small>
        </div>
        <div class="box box-blue">
          ABX Evaluation
          <small>phonetic discrimination</small>
        </div>
        <div class="box box-blue" style="font-size:20px; padding:6px 20px;">…</div>
      </div>
    </div>

    <div class="arrow"></div>
    <div class="ellipsis">…</div>

  </div>

  <div class="caption-wrap">Libri-light · Unsupervised baseline · CPC</div>

</body>
</html>
