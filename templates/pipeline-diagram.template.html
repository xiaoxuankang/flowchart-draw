<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title><!-- TITLE --></title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 24px 56px;
    }

    .diagram {
      display: flex;
      align-items: center;
      gap: 0;
      max-width: 1200px;
      flex-wrap: nowrap;
    }

    /* ── Input block (optional — remove if not needed) ── */
    .input-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .input-icon {
      width: 56px;
      height: 68px;
      position: relative;
    }

    .doc-sheet {
      position: absolute;
      width: 44px;
      height: 52px;
      background: #f5f5f5;
      border: 1.5px solid #bbb;
      border-radius: 4px;
    }

    .doc-sheet:nth-child(1) { top: 0;  left: 0;  }
    .doc-sheet:nth-child(2) { top: 6px; left: 6px; background: #fafafa; }
    .doc-sheet:nth-child(3) { top: 12px; left: 12px; background: #fff;
      display: flex; align-items: center; justify-content: center; }

    .doc-lines { display: flex; flex-direction: column; gap: 4px; width: 28px; }
    .doc-lines span { display: block; height: 3px; background: #aaa; border-radius: 1px; }
    .doc-lines span:nth-child(2) { width: 80%; }
    .doc-lines span:nth-child(3) { width: 60%; }

    .input-label {
      font-size: 15px;
      font-weight: 600;
      color: #222;
      text-align: center;
      line-height: 1.3;
    }

    .input-sub {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #666;
    }

    /* ── Arrows ── */
    .arrow {
      flex-shrink: 0;
      width: 36px;
      height: 2px;
      background: #333;
      position: relative;
      margin: 0 4px;
    }

    .arrow::after {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-left: 8px solid #333;
    }

    /* ── Dashed stage containers ── */
    .stage {
      border: 2px dashed #c8c8c8;
      border-radius: 18px;
      padding: 28px 24px 22px;
      position: relative;
      flex-shrink: 0;
    }

    .stage-title {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 0 12px;
      font-size: 17px;
      font-weight: 700;
      color: #222;
      white-space: nowrap;
    }

    .stage-inner {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Colored boxes ── */
    .box {
      border-radius: 14px;
      border: 1.5px solid rgba(0,0,0,0.12);
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      color: #222;
      text-align: center;
      line-height: 1.35;
      white-space: nowrap;
    }

    .box small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #555;
      margin-top: 3px;
      white-space: normal;
    }

    .box-pink   { background: #f5c6cb; }
    .box-yellow { background: #fff3cd; }
    .box-blue   { background: #cce5ff; }
    .box-green  { background: #c3e6cb; }
    .box-orange { background: #ffddc1; }

    .ellipsis {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      letter-spacing: 2px;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .caption-wrap {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

  <!--
    REPLACE the diagram body below.
    See references/style-guide.md and ref_pictures/ for patterns.

    Typical structure:
      input-block → arrow → stage(s) → arrow → ellipsis (optional)
  -->

  <div class="diagram" id="diagram">

    <!-- INPUT (optional) -->
    <div class="input-block">
      <div class="input-icon">
        <div class="doc-sheet"></div>
        <div class="doc-sheet"></div>
        <div class="doc-sheet">
          <div class="doc-lines">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
      <div class="input-label">
        <!-- INPUT_LABEL -->
        <span class="input-sub"><!-- INPUT_SUB --></span>
      </div>
    </div>

    <div class="arrow"></div>

    <!-- STAGE 1 -->
    <div class="stage">
      <div class="stage-title"><!-- STAGE_1_NAME --></div>
      <div class="stage-inner">
        <div class="box box-pink"><!-- STEP --><small><!-- SUB --></small></div>
        <div class="arrow"></div>
        <div class="box box-yellow"><!-- STEP --><small><!-- SUB --></small></div>
      </div>
    </div>

    <div class="arrow"></div>

    <!-- STAGE 2 (vertical stack example) -->
    <div class="stage">
      <div class="stage-title"><!-- STAGE_2_NAME --></div>
      <div class="stack">
        <div class="box box-blue"><!-- STEP --><small><!-- SUB --></small></div>
        <div class="box box-blue"><!-- STEP --><small><!-- SUB --></small></div>
        <div class="box box-blue" style="font-size:20px; padding:6px 20px;">…</div>
      </div>
    </div>

    <div class="arrow"></div>
    <div class="ellipsis">…</div>

  </div>

  <div class="caption-wrap"><!-- CAPTION --></div>

</body>
</html>
