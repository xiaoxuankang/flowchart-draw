<?xml version="1.0" encoding="UTF-8"?>
<!--
  flowchart-draw SVG template
  Edit labels (text nodes), fills, and rect positions directly.
  Same color palette as HTML  see references/style-guide.md
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <style>
      .box-label { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #222; }
      .box-sub   { font-family: "Segoe UI", Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #555; }
      .stage-title { font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #222; }
      .input-label { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #222; }
      .caption { font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; fill: #999; }
    </style>
  </defs>

  <!-- white background -->
  <rect width="1100" height="320" fill="#ffffff"/>

  <!-- INPUT -->
  <rect x="24" y="108" width="44" height="52" rx="4" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <rect x="30" y="114" width="44" height="52" rx="4" fill="#fafafa" stroke="#bbb" stroke-width="1.5"/>
  <rect x="36" y="120" width="44" height="52" rx="4" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <text x="58" y="210" text-anchor="middle" class="input-label"><!-- INPUT_LABEL --></text>
  <text x="58" y="228" text-anchor="middle" class="box-sub"><!-- INPUT_SUB --></text>

  <!-- arrow input ’ stage1 -->
  <line x1="92" y1="146" x2="128" y2="146" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- STAGE 1 (dashed) -->
  <rect x="136" y="72" width="340" height="148" rx="18" fill="none" stroke="#c8c8c8" stroke-width="2" stroke-dasharray="8 5"/>
  <rect x="248" y="64" width="120" height="22" fill="#fff"/>
  <text x="308" y="80" text-anchor="middle" class="stage-title"><!-- STAGE_1_NAME --></text>

  <!-- step boxes stage 1 -->
  <rect x="160" y="118" width="120" height="56" rx="14" fill="#f5c6cb" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <text x="220" y="142" text-anchor="middle" class="box-label"><!-- STEP_1A --></text>
  <text x="220" y="160" text-anchor="middle" class="box-sub"><!-- SUB_1A --></text>

  <line x1="284" y1="146" x2="312" y2="146" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="320" y="118" width="132" height="56" rx="14" fill="#fff3cd" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <text x="386" y="142" text-anchor="middle" class="box-label"><!-- STEP_1B --></text>
  <text x="386" y="160" text-anchor="middle" class="box-sub"><!-- SUB_1B --></text>

  <!-- arrow stage1 ’ stage2 -->
  <line x1="480" y1="146" x2="516" y2="146" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- STAGE 2 (dashed) -->
  <rect x="524" y="72" width="280" height="148" rx="18" fill="none" stroke="#c8c8c8" stroke-width="2" stroke-dasharray="8 5"/>
  <rect x="604" y="64" width="120" height="22" fill="#fff"/>
  <text x="664" y="80" text-anchor="middle" class="stage-title"><!-- STAGE_2_NAME --></text>

  <rect x="548" y="110" width="232" height="48" rx="14" fill="#cce5ff" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <text x="664" y="132" text-anchor="middle" class="box-label"><!-- STEP_2A --></text>
  <text x="664" y="148" text-anchor="middle" class="box-sub"><!-- SUB_2A --></text>

  <rect x="548" y="168" width="232" height="48" rx="14" fill="#cce5ff" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <text x="664" y="190" text-anchor="middle" class="box-label"><!-- STEP_2B --></text>

  <!-- arrow stage2 ’ output -->
  <line x1="808" y1="146" x2="844" y2="146" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- OUTPUT / metric box -->
  <rect x="852" y="118" width="100" height="56" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="902" y="142" text-anchor="middle" class="box-label"><!-- OUTPUT_LABEL --></text>
  <text x="902" y="160" text-anchor="middle" class="box-sub"><!-- OUTPUT_SUB --></text>

  <!-- caption -->
  <text x="550" y="300" text-anchor="middle" class="caption"><!-- CAPTION --></text>
</svg>
